<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BreakPoint</title>

    <!-- PWA & Mobile Optimization -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#1a1a2e">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>BreakPoint</h1>
        <p>Calisthenics Progress Tracker</p>
    </header>

    <main>
        <!-- 1. DASHBOARD PAGE -->
        <div id="dashboard-page" class="page active">
            <div class="card">
                <h3>🔥 Current Streak: <span id="streak">0 Days</span></h3>
                <p>Total Workouts: <span id="total-workouts">0</span></p>
            </div>
            <div class="card">
                <h4>Latest Workout</h4>
                <div id="latest-workout">None</div>
            </div>
            <div class="card">
                <h4>Personal Records</h4>
                <div id="prs"></div>
            </div>
            <div class="card">
                <h4>Achievements</h4>
                <div id="achievements"></div>
            </div>
            
            <!-- Data Backup -->
            <div class="card" style="border: 1px dashed #666; margin-top: 20px;">
                <h4>Data Management</h4>
                <button onclick="exportData()" class="save-btn" style="background:#607d8b">📥 Export Backup</button>
                <label for="import-file" class="save-btn" style="display:block; cursor:pointer; text-align:center; background:#9e9e9e; margin-top:10px;">📤 Import Backup</label>
                <input type="file" id="import-file" style="display:none" onchange="importData(event)">
            </div>
        </div>

        <!-- 2. WORKOUT PAGE (The Builder) -->
        <div id="workout-page" class="page">
            <!-- Manage List Section -->
            <div class="card">
                <h4>Exercise Management</h4>
                <input type="text" id="new-warmup-name" placeholder="New Warm-up Name">
                <button onclick="addNewWarmupToList()" class="save-btn">Add Warm-up</button>
                <hr>
                <input type="text" id="new-exercise-name" placeholder="New Exercise Name">
                <button onclick="addNewExerciseToList()" class="save-btn">Add Exercise</button>
                <hr>
                <button onclick="deleteExerciseFromList()" class="delete-btn" style="width:100%">🗑️ Delete Selected Exercise</button>
            </div>

            <!-- Warm-up Builder -->
            <div class="card" style="border-left: 5px solid #ff9800;">
                <h3>🔥 Pre-Warm Up</h3>
                <label>Select Warm-up:</label>
                <select id="warmup-builder"></select>
                <input type="number" id="warmup-reps" placeholder="Reps (3 sets auto)">
                <button onclick="addWarmupToWorkout()" class="save-btn" style="background:#ff9800; color:white">➕ Add Warm-up</button>
            </div>

            <!-- Main Exercise Builder -->
            <div class="card" style="border-left: 5px solid #2196F3;">
                <h3>💪 Workout Builder</h3>
                <label>Select Exercise:</label>
                <select id="exercise-builder"></select>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                    <input type="number" id="set1" placeholder="Set 1">
                    <input type="number" id="set2" placeholder="Set 2">
                    <input type="number" id="set3" placeholder="Set 3">
                    <input type="number" id="set4" placeholder="Set 4">
                </div>
                <textarea id="workout-notes" placeholder="Exercise notes (optional)..." style="width:100%; margin-top:10px;"></textarea>
                <button onclick="addExercise()" class="save-btn" style="background:#2196F3; color:white">➕ Add Exercise</button>
            </div>

            <!-- Current Session List -->
            <h3 style="margin-top:20px;">Current Session</h3>
            <div id="current-workout"></div>
            
            <button onclick="saveFullWorkout()" class="save-btn" style="width:100%; background:#4CAF50; padding:15px; margin-top:20px; font-size:18px;">✅ Save Full Workout</button>
        </div>

        <!-- 3. SKILLS PAGE -->
        <div id="skills-page" class="page">
            <h2>Skill Trees</h2>
            
            <div class="card">
                <h4>Planche Progress <span id="planche-progress-text">0%</span></h4>
                <div class="progress-container"><div id="planche-progress-bar" class="progress-bar"></div></div>
                <div id="planche-skills">
                    <button class="skill-btn" data-index="0" onclick="toggleSkill(this)">Frog Stand</button>
                    <button class="skill-btn" data-index="1" onclick="toggleSkill(this)">Tuck Planche</button>
                    <button class="skill-btn" data-index="2" onclick="toggleSkill(this)">Advanced Tuck</button>
                    <button class="skill-btn" data-index="3" onclick="toggleSkill(this)">Straddle Planche</button>
                    <button class="skill-btn" data-index="4" onclick="toggleSkill(this)">Full Planche</button>
                </div>
            </div>

            <div
