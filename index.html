<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BreakPoint</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="icon-512.png">
</head>
<body>

    <header>
        <img src="logo.png" alt="BreakPoint Logo" class="logo">
        <p>Calisthenics Progress Tracker</p>
    </header>

    <main>
        <!-- 1. DASHBOARD PAGE -->
        <div id="dashboard-page" class="page active">
            <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3 style="margin:0; border:none; padding:0;">🔥 STREAK: <span id="streak">0 Days</span></h3>
                    <p style="margin:5px 0 0 0; opacity: 0.8;">Total Workouts: <span id="total-workouts">0</span></p>
                </div>
            </div>

            <!-- THIS CONTAINER HOLDS RECOVERY, LATEST, AND PRs -->
            <div id="prs"></div>

            <div class="card" style="border: 1px dashed #666; margin-top: 20px;">
                <button onclick="exportData()" style="background:#607d8b; color:white; border:none; padding:10px; border-radius:5px; width:100%;">📥 Export Backup</button>
            </div>
        </div>

        <!-- 2. WORKOUT PAGE -->
        <div id="workout-page" class="page" style="display:none;">
            <div class="card">
                <h4>Manage Exercises</h4>
                <input type="text" id="new-warmup-name" placeholder="New Warm-up Name">
                <button onclick="addNewWarmupToList()" class="save-btn">Add Warm-up Name</button>
                <hr style="margin: 15px 0; opacity: 0.1;">
                <input type="text" id="new-exercise-name" placeholder="New Main Exercise Name">
                <button onclick="addNewExerciseToList()" class="save-btn">Add Exercise Name</button>
                <hr style="margin: 15px 0; opacity: 0.1;">
                <button onclick="deleteExerciseFromList()" class="delete-btn" style="width:100%;">🗑️ Delete Selected Name</button>
            </div>

            <div class="card" style="border-left: 5px solid #ff9800;">
                <h3>🔥 Pre-specific Warm Up</h3>
                <select id="warmup-builder"></select>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="number" id="warmup-reps" placeholder="Reps/Secs">
                    <input type="number" id="warmup-sets" placeholder="Sets" value="1">
                </div>
                <button onclick="addWarmupToWorkout()" class="save-btn" style="background:#ff9800; color:white">➕ Add Warm-up to session</button>
            </div>

            <div class="card" style="border-left: 5px solid #2196F3;">
                <div style="display: flex; justify-content: space-between;">
                    <h3>💪 Main Workout Builder</h3>
                    <label style="font-size: 0.8rem;"><input type="checkbox" id="is-hold"> Hold (s)</label>
                </div>
                <select id="exercise-builder"></select>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top:10px;">
                    <input type="number" id="set1" placeholder="Set 1">
                    <input type="number" id="set2" placeholder="Set 2">
                    <input type="number" id="set3" placeholder="Set 3">
                    <input type="number" id="set4" placeholder="Set 4">
                </div>
                <textarea id="workout-notes" placeholder="Exercise notes..." style="width:100%; margin-top:10px;"></textarea>
                <button onclick="addExercise()" class="save-btn" style="background:#2196F3; color:white">➕ Add Exercise to session</button>
            </div>

            <div id="current-workout"></div>

            <div class="card" style="border-top: 2px solid #e94560;">
                <h4>Session Summary & Fatigue</h4>
                <label>Overall Fatigue: <span id="fatigue-value" style="color:#ffeb3b; font-weight:bold;">5</span>/10</label>
                <input type="range" id="fatigue-slider" min="1" max="10" value="5" step="1" 
                       oninput="document.getElementById('fatigue-value').textContent = this.value" 
                       style="accent-color: #e94560; margin: 15px 0; width: 100%;">
                <textarea id="session-summary" placeholder="Energy levels, focus, or specific pains..."></textarea>
            </div>

            <button onclick="saveFullWorkout()" class="save-btn" style="width:100%; background:#4CAF50; padding:15px; margin-top:10px; color:white; border:none; border-radius:5px; font-size:16px; font-weight:bold;">✅ Save Full Workout</button>
        </div>

        <!-- 3. SKILLS PAGE -->
        <div id="skills-page" class="page" style="display:none;">
            <h2 style="text-align:center; color:var(--accent); margin-bottom:20px;">Skill Progressions</h2>
            <div class="card skill-card" style="border-top: 4px solid #ff5722;">
                <div class="skill-header">
                    <h3>🦅 Planche Path</h3>
                    <span id="planche-percent">0%</span>
                </div>
                <div class="progress-container"><div id="planche-bar" class="progress-bar" style="background: #ff5722;"></div></div>
                <div id="planche-tree" class="tree-grid"></div>
            </div>

            <div class="card skill-card" style="border-top: 4px solid #ffeb3b; margin-top: 20px;">
                <div class="skill-header">
                    <h3>🤸 Handstand Path</h3>
                    <span id="handstand-percent">0%</span>
                </div>
                <div class="progress-container"><div id="handstand-bar" class="progress-bar" style="background: #ffeb3b;"></div></div>
                <div id="handstand-tree" class="tree-grid"></div>
            </div>
        </div>

        <!-- 4. HISTORY PAGE -->
        <div id="history-page" class="page" style="display:none;">
            <h2>History</h2>
            <div id="workout-history-list"></div>
        </div>
    </main>

    <nav>
        <button onclick="showPage('dashboard-page')"><span>🏠</span>Home</button>
        <button onclick="showPage('workout-page')"><span>💪</span>Workout</button>
        <button onclick="showPage('skills-page')"><span>🎯</span>Skills</button>
        <button onclick="showPage('history-page')"><span>📜</span>History</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
